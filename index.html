<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniAI Hub - Learn AI. Earn Money. Grow as a Student.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #0A192F;
            --secondary: #00C9A7;
            --accent: #FFD700;
            --dark: #020c1b;
            --light: #f8fafc;
            --gray: #8892b0;
            --light-gray: #e2e8f0;
            --glass: rgba(10, 25, 47, 0.85);
            --glass-border: rgba(0, 201, 167, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #ccd6f6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            text-align: center;
        }

        .loader-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(0, 201, 167, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
        }

        .loader-bar-inner {
            height: 100%;
            background: var(--secondary);
            border-radius: 2px;
            animation: loadBar 2s ease-in-out infinite;
        }

        @keyframes loadBar {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 4px; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 201, 167, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 201, 167, 0.6); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }
        .delay-4 { transition-delay: 0.4s; }
        .delay-5 { transition-delay: 0.5s; }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: transparent;
            transition: all 0.4s ease;
        }

        .navbar.scrolled {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            padding: 0.8rem 2rem;
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #ccd6f6;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: var(--secondary);
            color: var(--primary) !important;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: #00b396;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
        }

        .nav-cta::after { display: none !important; }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 350px;
            height: 100vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            z-index: 1001;
            padding: 80px 2rem 2rem;
            transition: right 0.4s ease;
            border-left: 1px solid var(--glass-border);
        }

        .mobile-menu.open {
            right: 0;
        }

        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mobile-menu-overlay.open {
            display: block;
            opacity: 1;
        }

        .mobile-menu-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .mobile-menu ul {
            list-style: none;
        }

        .mobile-menu li {
            margin-bottom: 1.5rem;
        }

        .mobile-menu a {
            color: #ccd6f6;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            display: block;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mobile-menu a:hover {
            color: var(--secondary);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 120px 2rem 80px;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 201, 167, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 201, 167, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .hero-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 201, 167, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        .hero-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticle 15s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: #e6f1ff;
        }

        .hero-text h1 span {
            color: var(--secondary);
            position: relative;
        }

        .hero-text h1 span::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(0, 201, 167, 0.3);
            z-index: -1;
            border-radius: 2px;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--gray);
            margin-bottom: 2rem;
            max-width: 500px;
            line-height: 1.7;
        }

        .hero-badges {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .hero-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 201, 167, 0.1);
            border: 1px solid rgba(0, 201, 167, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--secondary);
        }

        .hero-cta-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: var(--secondary);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: #00b396;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 201, 167, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
        }

        .btn-outline:hover {
            background: rgba(0, 201, 167, 0.1);
            transform: translateY(-3px);
        }

        .btn-accent {
            background: var(--accent);
            color: var(--primary);
        }

        .btn-accent:hover {
            background: #e6c200;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            animation: float 6s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .hero-card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .hero-card-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .hero-card-info h4 {
            color: #e6f1ff;
            font-size: 1rem;
        }

        .hero-card-info p {
            color: var(--gray);
            font-size: 0.8rem;
        }

        .hero-card-badge {
            display: inline-block;
            background: rgba(0, 201, 167, 0.2);
            color: var(--secondary);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .hero-card-task {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-card-task-info h5 {
            color: #e6f1ff;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .hero-card-task-info p {
            color: var(--gray);
            font-size: 0.75rem;
        }

        .hero-card-price {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-stat h3 {
            color: var(--secondary);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .hero-stat p {
            color: var(--gray);
            font-size: 0.75rem;
        }

        /* Section Styles */
        .section {
            padding: 100px 2rem;
            position: relative;
        }

        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 4rem;
        }

        .section-label {
            display: inline-block;
            color: var(--secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            background: rgba(0, 201, 167, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 50px;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: #e6f1ff;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .section-desc {
            color: var(--gray);
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* Features Section */
        .features-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--secondary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .feature-card:hover::before {
            transform: scaleX(1);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 201, 167, 0.4);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 201, 167, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .feature-card:hover .feature-icon {
            background: var(--secondary);
            color: var(--primary);
            transform: scale(1.1);
        }

        .feature-card h3 {
            color: #e6f1ff;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
        }

        .feature-card p {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* How It Works */
        .how-it-works {
            background: rgba(10, 25, 47, 0.5);
        }

        .steps-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .steps-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .step-tab {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 2px solid rgba(0, 201, 167, 0.3);
            background: transparent;
            color: #ccd6f6;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .step-tab.active {
            background: var(--secondary);
            color: var(--primary);
            border-color: var(--secondary);
        }

        .step-tab:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .step-tab.active:hover {
            color: var(--primary);
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .step-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            transition: all 0.4s ease;
        }

        .step-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .step-number {
            width: 60px;
            height: 60px;
            background: var(--secondary);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .step-number::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px dashed rgba(0, 201, 167, 0.3);
            border-radius: 50%;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .step-card h3 {
            color: #e6f1ff;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
        }

        .step-card p {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* Testimonials */
        .testimonials-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            transition: all 0.4s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .testimonial-stars {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .testimonial-text {
            color: #ccd6f6;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .testimonial-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .testimonial-info h4 {
            color: #e6f1ff;
            font-size: 1rem;
        }

        .testimonial-info p {
            color: var(--gray);
            font-size: 0.85rem;
        }

        /* CTA Banner */
        .cta-banner {
            padding: 80px 2rem;
            position: relative;
            overflow: hidden;
        }

        .cta-banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--secondary);
            opacity: 0.1;
        }

        .cta-banner-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .modal-close {

            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--secondary);
        }

        function BusinessDashboard({ navigate, addToast }) {
            const [showForm, setShowForm] = useState(false);
            const [postedTasks, setPostedTasks] = useState(POSTED_TASKS);
            const [formData, setFormData] = useState({ title: '', description: '', budget: '', deadline: '', type: 'Content Creation' });
            const [errors, setErrors] = useState({});

            const validateForm = () => {
                const newErrors = {};
                if (!formData.title.trim()) newErrors.title = 'Title is required';
                if (!formData.description.trim()) newErrors.description = 'Description is required';
                if (!formData.budget.trim()) newErrors.budget = 'Budget is required';
                if (!formData.deadline.trim()) newErrors.deadline = 'Deadline is required';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validateForm()) {
                    const newTask = {
                        id: Date.now(),
                        title: formData.title,
                        desc: formData.description,
                        price: formData.budget,
                        deadline: formData.deadline,
                        status: 'open',
                        applicants: 0
                    };
                    setPostedTasks([newTask, ...postedTasks]);
                    setShowForm(false);
                    setFormData({ title: '', description: '', budget: '', deadline: '', type: 'Content Creation' });
                    addToast('Task posted successfully!', 'success');
                }
            };

            return (
                <div className="dashboard">
                    <div className="dashboard-header">
                        <div className="dashboard-header-inner">
                            <h1 className="dashboard-title"><i className="fas fa-building"></i> Business Dashboard</h1>
                            <div className="dashboard-actions">
                                <button className="btn btn-primary" onClick={() => setShowForm(true)}>
                                    <i className="fas fa-plus"></i> Post New Task
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="dashboard-body">
                        <aside className="dashboard-sidebar">
                            <div className="dashboard-profile">
                                <div className="dashboard-avatar" style={{ background: '#FFD700', color: '#0A192F' }}>TF</div>
                                <h3>TechFlow Pvt Ltd</h3>
                                <p>Software Company</p>
                            </div>
                            <ul className="dashboard-menu">
                                <li><a href="#" className="active" onClick={(e) => e.preventDefault()}><i className="fas fa-tasks"></i> My Tasks</a></li>
                                <li><a href="#" onClick={(e) => e.preventDefault()}><i className="fas fa-users"></i> Applicants</a></li>
                                <li><a href="#" onClick={(e) => e.preventDefault()}><i className="fas fa-chart-bar"></i> Analytics</a></li>
                                <li><a href="#" onClick={(e) => e.preventDefault()}><i className="fas fa-cog"></i> Settings</a></li>
                                <li><a href="#" onClick={(e) => { e.preventDefault(); navigate('home'); }}><i className="fas fa-sign-out-alt"></i> Logout</a></li>
                            </ul>
                        </aside>
                        <main className="dashboard-main">
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-card-icon green"><i className="fas fa-tasks"></i></div>
                                    <h4>{postedTasks.length}</h4>
                                    <p>Active Tasks</p>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-card-icon blue"><i className="fas fa-users"></i></div>
                                    <h4>8</h4>
                                    <p>Total Applicants</p>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-card-icon gold"><i className="fas fa-check-circle"></i></div>
                                    <h4>5</h4>
                                    <p>Completed</p>
                                </div>
                            </div>

                            <div className="dashboard-card">
                                <div className="dashboard-card-header">
                                    <h3><i className="fas fa-list"></i> Posted Tasks</h3>
                                    <button className="btn btn-primary" style={{ padding: '0.5rem 1rem', fontSize: '0.85rem' }} onClick={() => setShowForm(true)}>
                                        <i className="fas fa-plus"></i> Post Task
                                    </button>
                                </div>
                                <div className="task-list">
                                    {postedTasks.map(task => (
                                        <div key={task.id} className="task-item">
                                            <div className="task-info">
                                                <h4>{task.title}</h4>
                                                <p>{task.desc} • {task.applicants !== undefined ? `${task.applicants} applicants` : ''}</p>
                                            </div>
                                            <div className="task-meta">
                                                <span className="task-price">{task.price}</span>
                                                <span className="task-deadline"><i className="fas fa-clock"></i> {task.deadline}</span>
                                                <span className={`task-status ${task.status}`}>{task.status}</span>
                                                <button className="btn btn-outline" style={{ padding: '0.4rem 1rem', fontSize: '0.8rem' }}>
                                                    View

                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    </div>

                    {/* Post Task Modal */}
                    {showForm && (
                        <div className="modal-overlay open" onClick={(e) => { if (e.target === e.currentTarget) setShowForm(false); }}>
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h3><i className="fas fa-plus-circle"></i> Post a New Task</h3>
                                    <button className="modal-close" onClick={() => setShowForm(false)}><i className="fas fa-times"></i></button>

                                <form onSubmit={handleSubmit}>
                                    <div className="form-group">

                                            value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        {errors.title && <div className="form-error">{errors.title}</div>}
                                    </div>
                                    <div className="form-group">
                                        <label>Description</label>
                                        <textarea className="form-control" placeholder="Describe the task requirements..."
                                            value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>
                                        {errors.description && <div className="form-error">{errors.description}</div>}
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>Budget (LKR)</label>
                                            <input type="text" className="form-control" placeholder="e.g., Rs. 15,000"
                                                value={formData.budget} onChange={e => setFormData({...formData, budget: e.target.value})} />
                                            {errors.budget && <div className="form-error">{errors.budget}</div>}
                                        </div>
                                        <div className="form-group">
                                            <label>Deadline</label>
                                            <input type="text" className="form-control" placeholder="e.g., 5 days"
                                                value={formData.deadline} onChange={e => setFormData({...formData, deadline: e.target.value})} />
                                            {errors.deadline && <div className="form-error">{errors.deadline}</div>}
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label>Task Type</label>
                                        <select className="form-control" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                            <option>Content Creation</option>
                                            <option>AI Development</option>
                                            <option>Copywriting</option>
                                            <option>Data Science</option>
                                            <option>Video Editing</option>
                                            <option>Research</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>
                                        <i className="fas fa-paper-plane"></i> Post Task
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ===================== HOOKS =====================
        function useScrollAnimation() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        }

        function useScrollNav() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return scrolled;
        }

                                        {Array.from({ length: t.rating }, (_, j) => (
                                            <i key={j} className="fas fa-star"></i>
                                        ))}
                                    </div>
                                    <p className="testimonial-text">"{t.text}"</p>
                                    <div className="testimonial-author">
                                        <div className="testimonial-avatar">{t.initial}</div>
                                        <div className="testimonial-info">
                                            <h4>{t.name}</h4>
                                            <p>{t.role}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* CTA Banner */}
                    <section className="cta-banner">
                        <div className="cta-banner-bg"></div>
                        <div className="cta-banner-content animate-on-scroll">
                            <h2>Ready to Start Your AI Journey?</h2>
                            <p>Join 5,000+ Sri Lankan university students already earning with AI skills.</p>
                            <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', flexWrap: 'wrap' }}>
                                <button className="btn btn-primary" onClick={() => navigate('register')}>
                                    <i className="fas fa-rocket"></i> Join Free Today
                                </button>
                                <button className="btn btn-outline" onClick={() => navigate('marketplace')}>
                                    <i className="fas fa-search"></i> Browse Tasks
                                </button>
                            </div>
                        </div>
                    </section>
                </>
            );
        }

        // ===================== MAIN APP =====================
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [toasts, setToasts] = useState([]);

            // Loading screen
            useEffect(() => {
                const timer = setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('hidden');
                }, 2000);
                return () => clearTimeout(timer);
            }, []);

            const navigate = (page) => {
                setCurrentPage(page);
                window.scrollTo(0, 0);
            };

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'home': return <HomePage navigate={navigate} addToast={addToast} />;
                    case 'student-dashboard': return <StudentDashboard navigate={navigate} addToast={addToast} />;
                    case 'business-dashboard': return <BusinessDashboard navigate={navigate} addToast={addToast} />;
                    case 'marketplace': return <MarketplacePage navigate={navigate} addToast={addToast} />;
                    case 'about': return <AboutPage />;
                    case 'contact': return <ContactPage addToast={addToast} />;
                    case 'login': return <LoginPage navigate={navigate} addToast={addToast} />;
                    case 'register': return <RegisterPage navigate={navigate} addToast={addToast} />;
                    default: return <HomePage navigate={navigate} addToast={addToast} />;
                }
            };

            const showNavFooter = !['login', 'register', 'student-dashboard', 'business-dashboard'].includes(currentPage);

            return (
                <>
                    {showNavFooter && <Navbar currentPage={currentPage} navigate={navigate} />}
                    {renderPage()}
                    {showNavFooter && <Footer navigate={navigate} />}
                    <ToastContainer toasts={toasts} removeToast={removeToast} />
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
